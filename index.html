<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0f0f0f;--s1:#1a1a1a;--s2:#222;--b1:#2a2a2a;--b2:#333;--t1:#e8e8e8;--t2:#aaa;--t3:#666;--acc:#e8c56a;--acc2:#c9a84c;--green:#5cb85c;--red:#e05555;--blue:#5b9cf6;--orange:#f0a04b;--r:8px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px;line-height:1.6}
header{border-bottom:1px solid var(--b1);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;background:var(--bg);z-index:100}
.logo{font-family:var(--mono);font-size:13px;color:var(--acc);letter-spacing:.08em;font-weight:500}
.logo span{color:#444}
.htag{font-size:11px;font-family:var(--mono);padding:2px 8px;border-radius:4px;background:#1a1600;color:var(--acc2);border:1px solid #3a2f0a}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dbadge{font-size:11px;font-family:var(--mono);color:var(--t3);display:flex;align-items:center;gap:5px}
.upd{font-size:10px;font-family:var(--mono);color:#444}
.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 52px)}
aside{border-right:1px solid var(--b1);overflow-y:auto;padding:10px 0}
.swrap{padding:0 10px 10px}
input.search{width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:6px 10px;color:var(--t1);font-size:12px;font-family:var(--sans);outline:none;transition:border .15s}
input.search:focus{border-color:#444}

.slabel{font-size:10px;font-family:var(--mono);letter-spacing:.12em;color:#444;padding:0 12px;margin-bottom:6px;text-transform:uppercase}

.fhdr:hover,.fhdr.open{background:var(--s1)}
.chev{font-size:9px;color:var(--t3);transition:transform .2s}

.mlist.open{display:block}
.mitem{display:flex;align-items:center;gap:7px;padding:5px 12px 5px 32px;cursor:pointer;font-size:12px;color:var(--t3);transition:all .1s;border-left:2px solid transparent}
.mitem:hover{color:var(--t1);background:#161616}
.mitem.active{color:var(--acc);background:#1a1600;border-left-color:var(--acc)}
.ytag{margin-left:auto;font-size:10px;font-family:var(--mono);color:#444}
.mitem.active .ytag{color:var(--acc2)}
main{overflow-y:auto;padding:24px 28px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:#444}
.empty-icon{font-size:36px;opacity:.2}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.card{background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);padding:14px}
.ctitle{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.ilabel{font-size:10px;color:#444;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.ival{font-size:13px;color:var(--t1);margin-bottom:8px}
.ival.hi{color:var(--acc);font-weight:500}
.ival.em{font-size:12px;font-family:var(--mono);color:var(--blue)}
.ival.warn{color:var(--orange);font-size:12px}
.doc{font-size:12px;color:#999;padding:2px 0;display:flex;gap:6px}
.doc::before{content:'·';color:#444;flex-shrink:0}
.alert-bar{background:#1a1200;border:1px solid #2d2000;border-radius:var(--r);padding:10px 14px;margin-bottom:14px}
.alert-title{font-size:10px;font-family:var(--mono);color:var(--acc2);letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase}
.alert-item{font-size:12px;color:#a07830;padding:2px 0;display:flex;gap:8px}
.alert-item::before{content:'▸';color:var(--acc2);flex-shrink:0}
.stitle{font-size:10px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;color:#333;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.stitle::after{content:'';flex:1;height:1px;background:var(--b1)}
.fiche-title{font-size:20px;font-weight:600;color:var(--t1);line-height:1.2}
.fiche-sub{font-size:13px;color:var(--t3);margin-top:3px}
.badge{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:3px}
.badge-green{background:#0d2e0d;color:var(--green);border:1px solid #1a4a1a}
.badge-yellow{background:#1a1600;color:var(--acc);border:1px solid #3a2f0a}
.badge-blue{background:#0a1628;color:var(--blue);border:1px solid #142040}

.ccard{background:#111;border:1px solid var(--b1);border-radius:6px;padding:10px}
.crole{font-size:12px;font-weight:500;color:var(--t2);margin-bottom:2px}
.cdesc{font-size:11px;color:#555;margin-bottom:6px;line-height:1.4}
.cline{font-size:11px;color:var(--t3);font-family:var(--mono);margin-bottom:2px}
.cline a{color:var(--blue);text-decoration:none}
.cline a:hover{text-decoration:underline}
table.tarifs{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono)}
table.tarifs th{text-align:left;font-size:10px;color:#555;padding:4px 8px;border-bottom:1px solid var(--b1);letter-spacing:.06em}
table.tarifs td{padding:5px 8px;border-bottom:1px solid #1e1e1e;color:var(--t1)}
table.tarifs td.tv{color:var(--acc);font-weight:500}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

const openGroups = {};
let current = null;

function buildSidebar(q=''){
  q=(q||'').toLowerCase();
  const grouped={};
  DATA.forEach(f=>{
    if(q&&!f.f.toLowerCase().includes(q)&&!f.m.toLowerCase().includes(q))return;
    if(!grouped[f.f])grouped[f.f]=[];
    grouped[f.f].push(f);
  });
  const sb=document.getElementById('sidebar');
  sb.innerHTML=Object.keys(grouped).sort().map(name=>{
    const items=grouped[name];
    const isOpen=openGroups[name]||!!q;
    const gid='g_'+name.replace(/[^a-z0-9]/gi,'_');
    return `<div class="fgroup">
      <div class="fhdr ${isOpen?'open':''}" onclick="toggleG('${name.replace(/'/g,"\\'")}','${gid}',this)">
        <span class="chev ${isOpen?'open':''}">▸</span>
        <span class="fname">${name}</span>
        <span class="cbadge">${items.length}</span>
      </div>
      <div class="mlist ${isOpen?'open':''}" id="${gid}">
        ${items.map(i=>`<div class="mitem ${current&&current.id===i.id?'active':''}" onclick="show('${i.id}')">
          <span style="font-size:7px">●</span>
          <span style="flex:1">${i.m}</span>
          <span class="ytag">${i.y}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleG(name,gid,hdr){
  openGroups[name]=!openGroups[name];
  buildSidebar(document.getElementById('search').value);
}

function show(id){
  const entry=DATA.find(d=>d.id===id);
  if(!entry)return;
  current=entry;
  buildSidebar(document.getElementById('search').value);
  render(entry.data,entry.f,entry.m,entry.y);
}

function row(label,val,cls=''){
  if(!val)return'';
  return`<div class="ilabel">${label}</div><div class="ival ${cls}">${val}</div>`;
}
function emailRow(label,val){
  if(!val)return'';
  return`<div class="ilabel">${label}</div><div class="ival em">${val}</div>`;
}
function docList(docs){
  if(!docs||!docs.length)return'';
  return docs.map(d=>`<div class="doc">${d}</div>`).join('');
}
function card(title,html){
  return`<div class="card"><div class="ctitle">${title}</div>${html}</div>`;
}
function section(t){return`<div class="stitle">${t}</div>`;}
function badge(txt,type){return`<span class="badge badge-${type}">${txt}</span>`;}

function render(d,fournisseur,marque,annee){
  const recent=parseInt(annee)>=2025;
  const alertes=d.alertes&&d.alertes.length?`<div class="alert-bar"><div class="alert-title">⚡ Points de vigilance</div>${d.alertes.map(a=>`<div class="alert-item">${a}</div>`).join('')}</div>`:'';
  const contacts=d.contacts&&d.contacts.filter(c=>c.role).length?`<div class="cgrid">${d.contacts.filter(c=>c.role).map(c=>`<div class="ccard"><div class="crole">${c.role}</div>${c.desc?`<div class="cdesc">${c.desc}</div>`:''} ${c.tel&&c.tel!=='—'?`<div class="cline">📞 ${c.tel}</div>`:''}${c.email?`<div class="cline">✉ <a href="mailto:${c.email}">${c.email}</a></div>`:''}</div>`).join('')}</div>`:'';
  const tarifs=d.tarifs&&d.tarifs.filter(t=>t.montant).length?`<table class="tarifs"><thead><tr><th>Type</th><th>Famille</th><th>Forfait</th></tr></thead><tbody>${d.tarifs.filter(t=>t.montant).map(t=>`<tr><td>${t.type||'—'}</td><td>${t.famille||'—'}</td><td class="tv">${t.montant}</td></tr>`).join('')}</tbody></table>`:'';

  document.getElementById('main').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div><div class="fiche-title">${d.fournisseur||fournisseur}</div><div class="fiche-sub">${d.marque||marque}</div></div>
      <div style="display:flex;gap:6px;flex-shrink:0">${badge(annee,recent?'green':'blue')}${d.periode?badge(d.periode,'yellow'):''}</div>
    </div>
    ${alertes}
    ${section('Garantie & PMS')}
    <div class="grid2">
      ${card('🛡 Garantie constructeur',row('Durée',d.garantie&&d.garantie.duree,'hi')+row('Territoire',d.garantie&&d.garantie.territoire)+(d.garantie&&d.garantie.alerte?`<div class="ival warn">⚠ ${d.garantie.alerte}</div>`:''))}
      ${card('⚡ PMS — Mise en service',row('Délai maximum',d.pms&&d.pms.delai,'hi')+emailRow('Envoyer à',d.pms&&d.pms.email)+(d.pms&&d.pms.docs&&d.pms.docs.length?`<div class="ilabel">Documents</div>${docList(d.pms.docs)}`:'')+(d.pms&&d.pms.alerte?`<div class="ival warn" style="margin-top:6px">⚠ ${d.pms.alerte}</div>`:''))}
    </div>
    ${section('Procédures garantie')}
    <div class="grid2">
      ${card('🔧 Panne sous garantie',emailRow('Contact',d.psg&&d.psg.email)+(d.psg&&d.psg.docs&&d.psg.docs.length?`<div class="ilabel">Documents</div>${docList(d.psg.docs)}`:'')+(d.psg&&d.psg.alerte?`<div class="ival warn" style="margin-top:6px">⚠ ${d.psg.alerte}</div>`:''))}
      ${card('🔁 Pannes multiples & R21j',row('Seuil pannes multiples',d.pannes_multiples&&d.pannes_multiples.seuil,'hi')+emailRow('Contact PM',d.pannes_multiples&&d.pannes_multiples.email)+(d.r21j&&d.r21j.delai?`<div style="border-top:1px solid var(--b1);margin:8px 0;padding-top:8px">${row('Règle 21j',d.r21j.delai)}${emailRow('Contact R21j',d.r21j.email)}${d.r21j.alerte?`<div class="ival warn">⚠ ${d.r21j.alerte}</div>`:''}</div>`:''))}
    </div>
    ${section('Hors garantie & Pièces')}
    <div class="grid2">
      ${card('⏰ Hors garantie & Vétusté',row('Tarifs',d.hors_garantie&&d.hors_garantie.tarif)+row('Vétusté',d.hors_garantie&&d.hors_garantie.vetuste))}
      ${card('📦 Pièces détachées',emailRow('Commander à',d.pieces&&d.pieces.email)+row('Disponibilité légale',d.pieces&&d.pieces.dispo,'hi')+(d.pieces&&d.pieces.tarif_hg?row('Tarif HG',d.pieces.tarif_hg):''))}
    </div>
    ${tarifs?section('Forfaits intervention')+`<div class="card" style="margin-bottom:10px">${tarifs}</div>`:''}
    ${contacts?section('Contacts')+`<div class="card">${contacts}</div>`:''}
  `;
}

buildSidebar();
</script>
